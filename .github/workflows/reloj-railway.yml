name: Reloj de Railway (Apagado/Encendido)

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  apagar:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 7 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Apagar Bot en Railway
        run: |
          npm i -g @railway/cli
          railway link -p 0eec1d9b-6cba-408d-9177-571c0fc7bef1
          railway down
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  encender:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 12 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Encender Bot en Railway
        run: |
          npm i -g @railway/cli
          railway link -p 0eec1d9b-6cba-408d-9177-571c0fc7bef1
          railway up -d
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
